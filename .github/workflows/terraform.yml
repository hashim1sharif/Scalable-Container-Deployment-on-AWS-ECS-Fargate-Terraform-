name: Terraform

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      AWS_REGION: eu-west-1
      TF_INPUT: false
      TF_IN_AUTOMATION: true

      TF_VAR_aws_region: eu-west-1
      TF_VAR_project_name: ecs-fastapi-blog
      TF_VAR_environment: dev
      TF_VAR_vpc_cidr: 10.0.0.0/16
      TF_VAR_public_subnet_az1_cidr: 10.0.1.0/24
      TF_VAR_public_subnet_az2_cidr: 10.0.2.0/24
      TF_VAR_private_subnet_az1_cidr: 10.0.3.0/24
      TF_VAR_private_subnet_az2_cidr: 10.0.4.0/24
      TF_VAR_container_port: 8000
      TF_VAR_domain_name: hashim-next-gen.com
      TF_VAR_subdomain_name: api
      TF_VAR_db_name: fastapi
      TF_VAR_db_username: postgres
      TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan -no-color

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
        run: terraform apply -input=false -auto-approve tfplan