name: Terraform

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-infra
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    env:
      AWS_REGION: eu-west-1
      TF_INPUT: false
      TF_IN_AUTOMATION: true

      TF_VAR_aws_region: eu-west-1
      TF_VAR_project_name: ${{ vars.TF_PROJECT_NAME }}
      TF_VAR_environment: ${{ vars.TF_ENVIRONMENT }}
      TF_VAR_vpc_cidr: ${{ vars.TF_VPC_CIDR }}
      TF_VAR_public_subnet_az1_cidr: ${{ vars.TF_PUBLIC_SUBNET_AZ1_CIDR }}
      TF_VAR_public_subnet_az2_cidr: ${{ vars.TF_PUBLIC_SUBNET_AZ2_CIDR }}
      TF_VAR_private_subnet_az1_cidr: ${{ vars.TF_PRIVATE_SUBNET_AZ1_CIDR }}
      TF_VAR_private_subnet_az2_cidr: ${{ vars.TF_PRIVATE_SUBNET_AZ2_CIDR }}
      TF_VAR_container_port: ${{ vars.TF_CONTAINER_PORT }}
      TF_VAR_domain_name: ${{ vars.TF_DOMAIN_NAME }}
      TF_VAR_subdomain_name: ${{ vars.TF_SUBDOMAIN_NAME }}
      TF_VAR_db_name: ${{ vars.TF_DB_NAME }}
      TF_VAR_db_username: ${{ vars.TF_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Debug Terraform environment
        run: |
          echo "AWS_REGION=$AWS_REGION"
          echo "TF_VAR_aws_region=$TF_VAR_aws_region"
          echo "TF_VAR_project_name=$TF_VAR_project_name"
          echo "TF_VAR_environment=$TF_VAR_environment"
          echo "TF_VAR_domain_name=$TF_VAR_domain_name"
          echo "Using updated terraform workflow"

      - name: Terraform Init
        run: terraform init -input=false -lock-timeout=5m

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -lock-timeout=5m -out=tfplan -no-color

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
        run: terraform apply -input=false -auto-approve tfplan